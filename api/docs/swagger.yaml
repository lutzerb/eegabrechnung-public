  /eegs/{eegID}/restore:
    post:
      consumes:
      - multipart/form-data
      description: 'Restores all EEG data from a previously exported JSON backup file.
        The operation runs inside a single database transaction: existing data for
        the EEG is deleted in FK-safe order, then all records from the backup are
        re-inserted. The backup file must be uploaded as multipart/form-data with
        field name ''file''. Only backup version ''1'' is supported.'
      parameters:
      - description: EEG UUID
        in: path
        name: eegID
        required: true
        type: string
      - description: JSON backup file (produced by the Export endpoint)
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: counts of restored records
          schema:
            additionalProperties:
              type: integer
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Restore EEG data from a backup snapshot
      tags:
      - System

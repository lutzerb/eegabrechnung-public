      description: Looks up a pending onboarding request by email + EEG ID, issues
        a fresh magic token, and resends the status link email. Always returns HTTP
        200 to avoid email enumeration.
      parameters:
      - description: Email and EEG ID
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.resendTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Resend onboarding status magic token
      tags:
      - Onboarding
  /public/onboarding/status/{token}:
    get:
      description: Returns the onboarding request corresponding to the given magic
        token. Returns 410 Gone if the token has expired.
      parameters:
      - description: Magic token from status email
        in: path
        name: token
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.OnboardingRequest'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "410":
          description: Token expired
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get onboarding request status by magic token
      tags:
      - Onboarding
  /public/portal/exchange:
    post:
      consumes:
      - application/json
      description: Exchanges a one-time magic link token (from the login email) for
        a long-lived session token. The session token must be passed as X-Portal-Session
        header on subsequent portal requests.
      parameters:
      - description: One-time magic link token
        in: body
        name: body
        required: true
        schema:
          properties:
            token:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: session_token, member_id, eeg_id
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Link invalid or expired
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Exchange magic link token for a portal session
      tags:
      - Mitgliederportal
  /public/portal/invoices:
    get:
      description: Returns all invoices for the authenticated member. Requires a valid
        X-Portal-Session header.
      parameters:
      - description: Portal session token
        in: header
        name: X-Portal-Session
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.Invoice'
            type: array
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get member's invoices
      tags:
      - Mitgliederportal
  /public/portal/invoices/{invoiceID}/pdf:
    get:
      description: Streams the PDF file for the given invoice. The invoice must belong
        to the member identified by the X-Portal-Session header. Returns 404 if the
        PDF has not yet been generated.
      parameters:
      - description: Portal session token
        in: header
        name: X-Portal-Session
        required: true
        type: string
      - description: Invoice UUID
        in: path
        name: invoiceID
        required: true
        type: string
      produces:
      - application/pdf
      responses:
        "200":
          description: OK
          schema:
            type: file
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Download invoice PDF
      tags:
      - Mitgliederportal
  /public/portal/me:
    get:
      description: Returns the member record and associated EEG details for the portal
        session identified by the X-Portal-Session header.
      parameters:
      - description: Portal session token
        in: header
        name: X-Portal-Session
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: member and eeg fields
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get authenticated member's profile and EEG info
      tags:
      - Mitgliederportal
  /public/portal/request-link:
    post:
      consumes:
      - application/json
      description: Looks up the member by email (and optionally eeg_id) and sends
        a magic login link by email. If the email is associated with multiple EEGs
        and no eeg_id is given, returns a list of EEG choices for the user to select.
        Always returns HTTP 200 to avoid email enumeration.
      parameters:
      - description: Member email and optional EEG ID
        in: body
        name: body
        required: true
        schema:
          properties:
            eeg_id:
              type: string
            email:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Request a magic login link for the member portal
      tags:
      - Mitgliederportal
security:
- BearerAuth: []
securityDefinitions:
  BearerAuth:
    description: 'Enter: Bearer {token}'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"

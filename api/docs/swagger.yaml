basePath: /api/v1
definitions:
  domain.BillingRun:
    properties:
      created_at:
        type: string
      eeg_id:
        type: string
      id:
        type: string
      invoice_count:
        type: integer
      period_end:
        type: string
      period_start:
        type: string
      status:
        type: string
      total_amount:
        type: number
    type: object
  domain.EDAError:
    properties:
      created_at:
        type: string
      direction:
        type: string
      eeg_id:
        type: string
      error_msg:
        type: string
      id:
        type: string
      message_type:
        type: string
      raw_content:
        type: string
      subject:
        type: string
    type: object
  domain.EDAMessage:
    properties:
      body:
        description: plain-text email body (MAIL transport)
        type: string
      created_at:
        type: string
      direction:
        type: string
      error_msg:
        type: string
      from_address:
        description: sender EDA address
        type: string
      id:
        type: string
      message_id:
        description: external message-id from MaKo header
        type: string
      message_type:
        type: string
      process:
        description: EDA process code, e.g. EC_EINZEL_ANM, DATEN_CRMSG
        type: string
      processed_at:
        type: string
      status:
        description: pending | sent | ack | error | processed
        type: string
      subject:
        type: string
      to_address:
        description: recipient EDA address
        type: string
    type: object
  domain.EDAProcess:
    properties:
      completed_at:
        type: string
      conversation_id:
        description: links outbound to inbound confirmations
        type: string
      created_at:
        type: string
      date_to:
        description: ECMPList DateTo
        type: string
      deadline_at:
        description: 2 months for ANM (EAG §16e)
        type: string
      ec_dis_model:
        description: ECMPList-specific fields (EC_PRTFACT_CHG)
        type: string
      ec_share:
        description: optional share % in static model
        type: number
      eeg_id:
        type: string
      energy_direction:
        description: CONSUMPTION or GENERATION
        type: string
      error_msg:
        type: string
      error_notification_sent_at:
        type: string
      id:
        type: string
      initiated_at:
        type: string
      member_name:
        description: Joined field — only populated by ListByEEG, empty in other queries.
        type: string
      meter_point_id:
        type: string
      participation_factor:
        type: number
      process_type:
        description: EC_REQ_ONL, EC_REQ_OFF, CM_REV_SP, EC_PRTFACT_CHG, EC_REQ_PT
        type: string
      share_type:
        description: GC, RC_R, RC_L, CC, NONE, MULTI
        type: string
      status:
        description: pending, sent, first_confirmed, confirmed, completed, rejected,
          error
        type: string
      valid_from:
        type: string
      zaehlpunkt:
        type: string
    type: object
  domain.EDAWorkerStatus:
    properties:
      last_error:
        type: string
      last_poll_at:
        type: string
      transport_mode:
        type: string
      updated_at:
        type: string
    type: object
  domain.EEG:
    properties:
      accounting_debitor_prefix:
        description: base for member debitor accounts (default 10000)
        type: integer
      accounting_expense_account:
        description: Aufwandskonto Einspeisung (default 5000)
        type: integer
      accounting_revenue_account:
        description: Accounting / DATEV export configuration
        type: integer
      auto_billing_day_of_month:
        description: 1–28
        type: integer
      auto_billing_enabled:
        description: 'Auto-billing: create draft billing run automatically on a fixed
          day each month/quarter'
        type: boolean
      auto_billing_last_run_at:
        type: string
      auto_billing_period:
        description: '"monthly"|"quarterly"'
        type: string
      bic:
        description: EEG's bank BIC (optional)
        type: string
      billing_period:
        description: monthly | quarterly | semiannual | annual
        type: string
      created_at:
        type: string
      credit_note_number_digits:
        description: e.g. 5
        type: integer
      credit_note_number_prefix:
        description: e.g. "GS"
        type: string
      datev_client_nr:
        description: DATEV Mandantennummer (optional)
        type: string
      datev_consultant_nr:
        description: DATEV Beraternummer (optional)
        type: string
      discount_pct:
        description: discount on consumption in %
        type: number
      eda_imap_host:
        description: |-
          Per-EEG EDA credentials (IMAP polling + SMTP send to edanet.at).
          Passwords are stored encrypted in the DB; the repository decrypts them.
          Returned as "***" via API if set; send empty or "***" to keep existing.
        type: string
      eda_imap_password:
        type: string
      eda_imap_user:
        type: string
      eda_marktpartner_id:
        description: own EC/GC/RC number for outbound messages
        type: string
      eda_netzbetreiber_id:
        description: Netzbetreiber ECNumber to send messages to
        type: string
      eda_smtp_from:
        type: string
      eda_smtp_host:
        type: string
      eda_smtp_password:
        type: string
      eda_smtp_user:
        type: string
      eda_transition_date:
        description: EDA communication settings (Austrian MaKo protocol)
        type: string
      energy_price:
        description: consumer work price ct/kWh (net)
        type: number
      free_kwh:
        description: complimentary kWh per member per period
        type: number
      gap_alert_enabled:
        description: 'Gap alert: notify when meter points have no readings for N days'
        type: boolean
      gap_alert_threshold_days:
        description: default 5
        type: integer
      gemeinschaft_id:
        type: string
      generate_credit_notes:
        description: Credit note settings (for VAT-liable producers)
        type: boolean
      gruendungsdatum:
        description: Founding date — coverage tool will not flag days before this
          as missing
        type: string
      iban:
        description: SEPA banking details for payment file generation
        type: string
      id:
        type: string
      invoice_footer_text:
        type: string
      invoice_number_digits:
        type: integer
      invoice_number_prefix:
        type: string
      invoice_number_start:
        description: first invoice number for this EEG
        type: integer
      invoice_post_text:
        type: string
      invoice_pre_text:
        type: string
      is_demo:
        description: IsDemo marks this EEG as a demo — emails and EDA messages are
          suppressed
        type: boolean
      logo_path:
        description: Company logo path (stored as absolute filesystem path)
        type: string
      meter_fee_eur:
        description: fixed fee per consumer meter point per period
        type: number
      name:
        type: string
      netzbetreiber:
        type: string
      onboarding_contract_text:
        description: Onboarding contract text shown to applicants (may include {iban}
          and {datum} placeholders)
        type: string
      organization_id:
        type: string
      ort:
        type: string
      participation_fee_eur:
        description: fixed member participation fee per period
        type: number
      plz:
        type: string
      portal_show_full_energy:
        description: 'Portal: whether to show full energy data (total consumption/generation)
          in the member portal'
        type: boolean
      producer_price:
        description: producer feed-in price ct/kWh (net)
        type: number
      sepa_creditor_id:
        description: SEPA Gläubiger-ID for pain.008
        type: string
      sepa_pre_notification_days:
        description: |-
          SepaPreNotificationDays is the minimum days between invoice date and SEPA collection.
          SEPA Rulebook mandates ≥14 days. Configurable per EEG. Default: 14.
        type: integer
      smtp_from:
        type: string
      smtp_host:
        description: Per-EEG invoice SMTP credentials (Rechnungsversand via resend
          / own SMTP).
        type: string
      smtp_password:
        type: string
      smtp_user:
        type: string
      strasse:
        description: Rechnungssteller (§11 UStG) — EEG address shown on invoices
        type: string
      uid_nummer:
        description: EEG VAT ID (optional, not all EEGs are VAT-registered)
        type: string
      use_vat:
        description: include VAT on invoices
        type: boolean
      vat_pct:
        description: VAT percentage (e.g. 20)
        type: number
    type: object
  domain.EEGMeterParticipation:
    properties:
      created_at:
        type: string
      eeg_id:
        type: string
      id:
        type: string
      meter_point_id:
        type: string
      notes:
        type: string
      participation_factor:
        description: 0.0001–100
        type: number
      share_type:
        description: GC | RC_R | RC_L | CC
        type: string
      valid_from:
        type: string
      valid_until:
        description: nil = open-ended
        type: string
    type: object
  domain.EnergyReading:
    properties:
      created_at:
        type: string
      id:
        type: string
      meter_point_id:
        type: string
      quality:
        description: L0 (total), L1 (measured), L2 (substitute), L3 (faulty — excluded
          from billing)
        type: string
      source:
        description: '"xlsx" or "eda"'
        type: string
      ts:
        type: string
      wh_community:
        type: number
      wh_self:
        type: number
      wh_total:
        type: number
    type: object
  domain.EnergySummaryRow:
    properties:
      period:
        type: string
      wh_community:
        description: EEG share fed in (GENERATION wh_community)
        type: number
      wh_restbedarf:
        description: grid demand = wh_total_consumption - wh_self
        type: number
      wh_resteinspeisung:
        description: grid export  = wh_total_generation - wh_community
        type: number
      wh_self:
        description: EEG share consumed (CONSUMPTION wh_self)
        type: number
      wh_total_consumption:
        description: total consumption (CONSUMPTION wh_total)
        type: number
      wh_total_generation:
        description: total generation (GENERATION wh_total)
        type: number
    type: object
  domain.Invoice:
    properties:
      billing_run_id:
        type: string
      consumption_kwh:
        description: community kWh consumed
        type: number
      consumption_net_amount:
        description: Split net amounts — stored separately to enable per-account EA
          import bookings
        type: number
      consumption_vat_amount:
        type: number
      consumption_vat_pct:
        description: Split VAT — consumption uses EEG-level rate, generation uses
          member-specific rate
        type: number
      created_at:
        type: string
      document_type:
        description: '"invoice" or "credit_note"'
        type: string
      eeg_id:
        type: string
      generation_kwh:
        description: community kWh generated/fed in
        type: number
      generation_net_amount:
        description: net Einspeisung (generation credit before VAT)
        type: number
      generation_vat_amount:
        type: number
      generation_vat_pct:
        type: number
      id:
        type: string
      invoice_number:
        type: integer
      member_id:
        type: string
      net_amount:
        description: net amount before VAT
        type: number
      pdf_path:
        type: string
      period_end:
        type: string
      period_start:
        type: string
      sent_at:
        type: string
      sepa_return_at:
        description: SEPA return (Rücklastschrift) tracking
        type: string
      sepa_return_note:
        type: string
      sepa_return_reason:
        type: string
      status:
        type: string
      storno_pdf_path:
        description: set when invoice is formally cancelled (storno document)
        type: string
      total_amount:
        description: gross saldo incl. VAT (may be negative for producers)
        type: number
      total_kwh:
        description: consumption kWh (for display/stats)
        type: number
      vat_amount:
        description: total VAT (consumption + generation)
        type: number
      vat_pct_applied:
        description: EEG-level VAT rate (consumption side)
        type: number
    type: object
  domain.Member:
    properties:
      austritts_datum:
        type: string
      beitritts_datum:
        type: string
      business_role:
        description: |-
          BusinessRole classifies the member for VAT purposes on credit notes.
          Valid values: "privat", "kleinunternehmer", "landwirt_pauschaliert",
          "unternehmen", "gemeinde_bga", "gemeinde_hoheitlich"
        type: string
      created_at:
        type: string
      eeg_id:
        type: string
      email:
        type: string
      iban:
        type: string
      id:
        type: string
      mitglieds_nr:
        type: string
      name1:
        type: string
      name2:
        type: string
      ort:
        type: string
      plz:
        type: string
      sepa_mandate_signed_at:
        description: SEPA mandate data captured during onboarding (used for mandate
          PDF)
        type: string
      sepa_mandate_signed_ip:
        type: string
      sepa_mandate_text:
        type: string
      status:
        description: 'Status tracks the member''s lifecycle: ACTIVE | REGISTERED |
          NEW | INACTIVE'
        type: string
      strasse:
        type: string
      uid_nummer:
        description: |-
          UidNummer is the member's VAT ID (UID).
          When set, the member is treated as VAT-liable → Reverse Charge on credit notes.
        type: string
      use_vat:
        description: |-
          UseVat / VatPct: reserved for future manual override on credit notes.
          NOT applied to consumer invoices (those use only the EEG's settings).
        type: boolean
      vat_pct:
        type: number
    type: object
  domain.MemberStat:
    properties:
      consumption_kwh:
        description: EEG share consumed (wh_self)
        type: number
      consumption_total_kwh:
        description: total consumption (wh_total); 0 for billed mode
        type: number
      generation_kwh:
        description: EEG share fed in (wh_community)
        type: number
      generation_total_kwh:
        description: total generation (wh_total); 0 for billed mode
        type: number
      invoice_count:
        type: integer
      member_id:
        type: string
      total_amount:
        type: number
    type: object
  domain.MeterPoint:
    properties:
      abgemeldet_am:
        type: string
      consent_id:
        description: NB-assigned ConsentId from ZUSTIMMUNG_ECON; required for CM_REV_SP
        type: string
      created_at:
        type: string
      eeg_id:
        type: string
      energierichtung:
        type: string
      gap_alert_sent_at:
        type: string
      generation_type:
        description: PV | Windkraft | Wasserkraft; only for GENERATION meters
        type: string
      id:
        type: string
      member_id:
        type: string
      notes:
        type: string
      registriert_seit:
        type: string
      status:
        type: string
      verteilungsmodell:
        type: string
      zaehlpunkt:
        type: string
      zugeteilte_menge_pct:
        type: number
    type: object
  domain.MonthlyEnergyRow:
    properties:
      consumption_kwh:
        type: number
      generation_kwh:
        type: number
      month:
        type: string
      payouts:
        description: absolute sum of negative invoice totals (producer credits)
        type: number
      revenue:
        description: sum of positive invoice totals (consumer charges incl. VAT)
        type: number
    type: object
  domain.OnboardingMeterPoint:
    properties:
      direction:
        description: CONSUMPTION or GENERATION
        type: string
      generation_type:
        description: PV | Windkraft | Wasserkraft | Biomasse | Sonstige — only for
          GENERATION
        type: string
      participation_factor:
        description: 0..100; 0 means default (100)
        type: number
      zaehlpunkt:
        type: string
    type: object
  domain.OnboardingRequest:
    properties:
      admin_notes:
        type: string
      beitritts_datum:
        description: desired join date from applicant
        type: string
      bic:
        type: string
      business_role:
        description: privat | kleinunternehmer | ...
        type: string
      contract_accepted_at:
        type: string
      contract_ip:
        type: string
      converted_member_id:
        type: string
      created_at:
        type: string
      eeg_id:
        type: string
      email:
        type: string
      iban:
        type: string
      id:
        type: string
      member_type:
        description: CONSUMER | PRODUCER | PROSUMER
        type: string
      meter_points:
        items:
          $ref: '#/definitions/domain.OnboardingMeterPoint'
        type: array
      name1:
        type: string
      name2:
        type: string
      ort:
        type: string
      phone:
        type: string
      plz:
        type: string
      reminder_sent_at:
        type: string
      status:
        type: string
      strasse:
        type: string
      uid_nummer:
        type: string
      updated_at:
        type: string
      use_vat:
        type: boolean
    type: object
  domain.TariffEntry:
    properties:
      created_at:
        type: string
      energy_price:
        description: ct/kWh
        type: number
      id:
        type: string
      producer_price:
        description: ct/kWh
        type: number
      schedule_id:
        type: string
      valid_from:
        type: string
      valid_until:
        type: string
    type: object
  domain.TariffSchedule:
    properties:
      created_at:
        type: string
      eeg_id:
        type: string
      entries:
        items:
          $ref: '#/definitions/domain.TariffEntry'
        type: array
      entry_count:
        type: integer
      granularity:
        description: annual | monthly | daily | quarter_hour
        type: string
      id:
        type: string
      is_active:
        type: boolean
      name:
        type: string
    type: object
  domain.User:
    properties:
      created_at:
        type: string
      email:
        type: string
      id:
        type: string
      name:
        type: string
      organization_id:
        type: string
      role:
        type: string
    type: object
  handler.EEGBackup:
    properties:
      billing_runs:
        items:
          $ref: '#/definitions/domain.BillingRun'
        type: array
      created_at:
        type: string
      eeg:
        $ref: '#/definitions/domain.EEG'
      invoices:
        items:
          $ref: '#/definitions/domain.Invoice'
        type: array
      members:
        items:
          $ref: '#/definitions/domain.Member'
        type: array
      meter_points:
        items:
          $ref: '#/definitions/domain.MeterPoint'
        type: array
      participations:
        items:
          $ref: '#/definitions/domain.EEGMeterParticipation'
        type: array
      readings:
        items:
          $ref: '#/definitions/domain.EnergyReading'
        type: array
      tariff_schedules:
        items:
          $ref: '#/definitions/domain.TariffSchedule'
        type: array
      version:
        type: string
    type: object
  handler.anmeldungRequest:
    properties:
      participation_factor:
        description: 0..100
        type: number
      share_type:
        description: GC, RC_R, RC_L, CC …
        type: string
      valid_from:
        description: YYYY-MM-DD
        type: string
      zaehlpunkt:
        type: string
    type: object
  handler.austrittRequest:
    properties:
      austritt_datum:
        description: YYYY-MM-DD, must be >= tomorrow (Vienna time)
        type: string
    type: object
  handler.createUserRequest:
    properties:
      email:
        type: string
      name:
        type: string
      password:
        type: string
      role:
        description: '"admin" or "user"'
        type: string
    type: object
  handler.edaMessagesResponse:
    properties:
      limit:
        type: integer
      messages:
        items:
          $ref: '#/definitions/domain.EDAMessage'
        type: array
      offset:
        type: integer
      total_count:
        type: integer
    type: object
  handler.eegRequest:
    properties:
      accounting_debitor_prefix:
        type: integer
      accounting_expense_account:
        type: integer
      accounting_revenue_account:
        description: Accounting / DATEV
        type: integer
      auto_billing_day_of_month:
        type: integer
      auto_billing_enabled:
        description: Auto-billing
        type: boolean
      auto_billing_period:
        type: string
      bic:
        type: string
      billing_period:
        type: string
      credit_note_number_digits:
        type: integer
      credit_note_number_prefix:
        type: string
      datev_client_nr:
        type: string
      datev_consultant_nr:
        type: string
      discount_pct:
        type: number
      eda_imap_host:
        description: Per-EEG EDA credentials (IMAP + SMTP for MaKo)
        type: string
      eda_imap_password:
        type: string
      eda_imap_user:
        type: string
      eda_marktpartner_id:
        type: string
      eda_netzbetreiber_id:
        type: string
      eda_smtp_from:
        type: string
      eda_smtp_host:
        type: string
      eda_smtp_password:
        type: string
      eda_smtp_user:
        type: string
      eda_transition_date:
        type: string
      energy_price:
        type: number
      free_kwh:
        type: number
      gap_alert_enabled:
        description: Gap alert
        type: boolean
      gap_alert_threshold_days:
        type: integer
      gemeinschaft_id:
        type: string
      generate_credit_notes:
        type: boolean
      gruendungsdatum:
        description: Gründungsdatum (date-only, YYYY-MM-DD)
        type: string
      iban:
        type: string
      invoice_footer_text:
        type: string
      invoice_number_digits:
        type: integer
      invoice_number_prefix:
        type: string
      invoice_number_start:
        type: integer
      invoice_post_text:
        type: string
      invoice_pre_text:
        type: string
      meter_fee_eur:
        type: number
      name:
        type: string
      netzbetreiber:
        type: string
      onboarding_contract_text:
        description: Onboarding
        type: string
      ort:
        type: string
      participation_fee_eur:
        type: number
      plz:
        type: string
      portal_show_full_energy:
        description: Member portal
        type: boolean
      producer_price:
        type: number
      sepa_creditor_id:
        type: string
      smtp_from:
        type: string
      smtp_host:
        description: Per-EEG invoice SMTP credentials
        type: string
      smtp_password:
        type: string
      smtp_user:
        type: string
      strasse:
        description: Rechnungssteller address (§11 UStG)
        type: string
      uid_nummer:
        type: string
      use_vat:
        type: boolean
      vat_pct:
        type: number
    type: object
  handler.memberRequest:
    properties:
      austritts_datum:
        type: string
      beitritts_datum:
        description: 'BeitrittsDatum / AustrittsDatum: YYYY-MM-DD date strings'
        type: string
      business_role:
        description: |-
          BusinessRole: "privat", "kleinunternehmer", "landwirt_pauschaliert",
          "unternehmen", "gemeinde_bga", "gemeinde_hoheitlich"
        type: string
      email:
        type: string
      iban:
        type: string
      mitglieds_nr:
        type: string
      name1:
        type: string
      name2:
        type: string
      ort:
        type: string
      plz:
        type: string
      status:
        description: 'Status: ACTIVE | REGISTERED | NEW | INACTIVE'
        type: string
      strasse:
        type: string
      uid_nummer:
        description: 'UidNummer: VAT ID of the member. When set → Reverse Charge on
          credit notes.'
        type: string
      use_vat:
        description: |-
          UseVat / VatPct: reserved for manual override on credit notes.
          NOT applied to consumer invoices.
        type: boolean
      vat_pct:
        type: number
    type: object
  handler.memberWithMeterPoints:
    properties:
      austritts_datum:
        type: string
      beitritts_datum:
        type: string
      business_role:
        type: string
      eeg_id:
        type: string
      email:
        type: string
      iban:
        type: string
      id:
        type: string
      meter_points:
        items:
          $ref: '#/definitions/handler.meterPointShort'
        type: array
      mitglieds_nr:
        type: string
      name:
        type: string
      name1:
        type: string
      name2:
        type: string
      ort:
        type: string
      plz:
        type: string
      status:
        type: string
      strasse:
        type: string
      uid_nummer:
        type: string
      use_vat:
        type: boolean
      vat_pct:
        type: number
    type: object
  handler.meterPointRequest:
    properties:
      energierichtung:
        type: string
      generation_type:
        description: PV | Windkraft | Wasserkraft
        type: string
      notes:
        type: string
      registriert_seit:
        type: string
      status:
        type: string
      verteilungsmodell:
        type: string
      zaehlpunkt:
        type: string
      zugeteilte_menge_pct:
        type: number
    type: object
  handler.meterPointShort:
    properties:
      abgemeldet_am:
        type: string
      abmeldung_status:
        description: latest CM_REV_SP status
        type: string
      anmeldung_status:
        description: latest EC_REQ_ONL status
        type: string
      direction:
        type: string
      generation_type:
        type: string
      id:
        type: string
      meter_id:
        type: string
      participation_factor:
        type: number
      registriert_seit:
        type: string
    type: object
  handler.onboardingSubmitRequest:
    properties:
      beitritts_datum:
        description: optional YYYY-MM-DD
        type: string
      bic:
        type: string
      business_role:
        description: privat | kleinunternehmer | ...
        type: string
      contract_accepted:
        type: boolean
      email:
        type: string
      iban:
        type: string
      member_type:
        type: string
      meter_points:
        items:
          $ref: '#/definitions/domain.OnboardingMeterPoint'
        type: array
      name1:
        type: string
      name2:
        type: string
      ort:
        type: string
      phone:
        type: string
      plz:
        type: string
      strasse:
        type: string
      uid_nummer:
        type: string
      use_vat:
        type: boolean
    type: object
  handler.participationRequest:
    properties:
      meter_point_id:
        type: string
      notes:
        type: string
      participation_factor:
        description: 0.0001–100
        type: number
      share_type:
        type: string
      valid_from:
        description: YYYY-MM-DD
        type: string
      valid_until:
        description: YYYY-MM-DD or empty
        type: string
    type: object
  handler.publicDocumentItem:
    properties:
      filename:
        type: string
      id:
        type: string
      mime_type:
        type: string
      title:
        type: string
    type: object
  handler.publicEEGInfo:
    properties:
      billing_period:
        type: string
      documents:
        items:
          $ref: '#/definitions/handler.publicDocumentItem'
        type: array
      id:
        type: string
      name:
        type: string
      onboarding_contract_text:
        type: string
    type: object
  handler.resendTokenRequest:
    properties:
      eeg_id:
        type: string
      email:
        type: string
    type: object
  handler.teilnahmefaktorRequest:
    properties:
      date_to:
        description: YYYY-MM-DD (default empty = 9999-12-31)
        type: string
      ec_dis_model:
        description: S or D (default "S")
        type: string
      ec_share:
        type: number
      energy_direction:
        description: CONSUMPTION or GENERATION (default "CONSUMPTION")
        type: string
      participation_factor:
        description: 0..100
        type: number
      share_type:
        description: GC, RC_R, RC_L, CC → ECType
        type: string
      valid_from:
        description: YYYY-MM-DD; defaults to tomorrow
        type: string
      zaehlpunkt:
        type: string
    type: object
  handler.updateStatusRequest:
    properties:
      admin_notes:
        type: string
      beitritts_datum:
        description: YYYY-MM-DD or ""
        type: string
      bic:
        type: string
      business_role:
        type: string
      custom_message:
        description: optional custom email body paragraph
        type: string
      email:
        type: string
      iban:
        type: string
      member_type:
        type: string
      meter_points:
        items:
          $ref: '#/definitions/domain.OnboardingMeterPoint'
        type: array
      name1:
        description: Field-update fields (used when Status is "")
        type: string
      name2:
        type: string
      netzbetreiber_id:
        description: optional override for conversion email
        type: string
      ort:
        type: string
      phone:
        type: string
      plz:
        type: string
      status:
        type: string
      strasse:
        type: string
      uid_nummer:
        type: string
      use_vat:
        type: boolean
    type: object
  handler.updateUserRequest:
    properties:
      email:
        type: string
      name:
        type: string
      password:
        description: optional — omit to keep existing password
        type: string
      role:
        description: '"admin" or "user"'
        type: string
    type: object
  handler.widerrufRequest:
    properties:
      consent_end:
        description: YYYY-MM-DD; min today, max +30 Austrian working days
        type: string
      reason:
        type: string
      reason_key:
        type: integer
      zaehlpunkt:
        type: string
    type: object
  handler.zaehlerstandsgangRequest:
    properties:
      date_from:
        description: YYYY-MM-DD
        type: string
      date_to:
        description: YYYY-MM-DD
        type: string
      zaehlpunkt:
        type: string
    type: object
  repository.MeterPointGap:
    properties:
      abgemeldet_am:
        type: string
      consent_id:
        description: NB-assigned ConsentId from ZUSTIMMUNG_ECON; required for CM_REV_SP
        type: string
      created_at:
        type: string
      eeg_id:
        type: string
      energierichtung:
        type: string
      gap_alert_sent_at:
        type: string
      generation_type:
        description: PV | Windkraft | Wasserkraft; only for GENERATION meters
        type: string
      id:
        type: string
      last_reading_at:
        description: nil = never had readings
        type: string
      member_id:
        type: string
      member_name:
        type: string
      notes:
        type: string
      registriert_seit:
        type: string
      status:
        type: string
      verteilungsmodell:
        type: string
      zaehlpunkt:
        type: string
      zugeteilte_menge_pct:
        type: number
    type: object
host: localhost:8101
info:
  contact:
    email: support@eeg.at
    name: eegabrechnung Support
  description: Österreichische EEG (Energiegemeinschaft) Abrechnungsplattform — REST
    API
  license:
    name: MIT
  termsOfService: http://swagger.io/terms/
  title: eegabrechnung API
  version: "1.0"
paths:
  /admin/users:
    get:
      description: Returns all users belonging to the caller's organisation. Requires
        admin role.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.User'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List all users
      tags:
      - Benutzerverwaltung
    post:
      consumes:
      - application/json
      description: Creates a new user in the caller's organisation. The password is
        bcrypt-hashed before storage. Role defaults to 'user' if not specified or
        invalid. Requires admin role.
      parameters:
      - description: New user details
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.createUserRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/domain.User'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create a new user
      tags:
      - Benutzerverwaltung
  /admin/users/{userID}:
    delete:
      description: Permanently deletes the given user. The user must belong to the
        caller's organisation. Self-deletion is not allowed. Requires admin role.
      parameters:
      - description: User UUID
        in: path
        name: userID
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete a user
      tags:
      - Benutzerverwaltung
    get:
      description: Returns a single user record. The user must belong to the caller's
        organisation. Requires admin role.
      parameters:
      - description: User UUID
        in: path
        name: userID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.User'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get a user by ID
      tags:
      - Benutzerverwaltung
    put:
      consumes:
      - application/json
      description: Updates name, email, and role for the given user. If password is
        provided, it is re-hashed and stored. The user must belong to the caller's
        organisation. Requires admin role.
      parameters:
      - description: User UUID
        in: path
        name: userID
        required: true
        type: string
      - description: Updated user fields
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.updateUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.User'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update a user
      tags:
      - Benutzerverwaltung
  /admin/users/{userID}/eegs:
    get:
      description: Returns the list of EEG UUIDs that the user has been explicitly
        assigned to. Admins have implicit access to all EEGs. Requires admin role.
      parameters:
      - description: User UUID
        in: path
        name: userID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Array of EEG UUIDs
          schema:
            items:
              type: string
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get EEG assignments for a user
      tags:
      - Benutzerverwaltung
    put:
      consumes:
      - application/json
      description: Replaces the full set of EEG assignments for the user. Pass an
        empty array to remove all assignments. Requires admin role.
      parameters:
      - description: User UUID
        in: path
        name: userID
        required: true
        type: string
      - description: Array of EEG UUIDs to assign
        in: body
        name: body
        required: true
        schema:
          items:
            type: string
          type: array
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Set EEG assignments for a user
      tags:
      - Benutzerverwaltung
  /auth/login:
    post:
      consumes:
      - application/json
      description: Validates email/password credentials and returns a signed JWT together
        with basic user information.
      parameters:
      - description: Login credentials
        in: body
        name: credentials
        required: true
        schema:
          properties:
            email:
              type: string
            password:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: JWT token and user info
          schema:
            properties:
              token:
                type: string
              user:
                properties:
                  email:
                    type: string
                  id:
                    type: string
                  name:
                    type: string
                  organization_id:
                    type: string
                  role:
                    type: string
                type: object
            type: object
        "400":
          description: Bad request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Invalid credentials
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Authenticate user
      tags:
      - Auth
  /eda/worker-status:
    get:
      description: Returns the last-known status of the EDA worker (transport mode,
        last poll time, last error). Returns an empty status object if the worker
        has never run.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.EDAWorkerStatus'
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get EDA worker status
      tags:
      - EDA
  /eegs:
    get:
      description: Returns all EEGs accessible to the authenticated user. Admins see
        all EEGs in the organization; other roles see only their assigned EEGs.
      produces:
      - application/json
      responses:
        "200":
          description: List of EEGs
          schema:
            items:
              $ref: '#/definitions/domain.EEG'
            type: array
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List EEGs
      tags:
      - EEGs
    post:
      consumes:
      - application/json
      description: Creates a new Energiegemeinschaft (EEG) within the authenticated
        user's organization. Fields name and netzbetreiber are required.
      parameters:
      - description: EEG data (name and netzbetreiber required)
        in: body
        name: eeg
        required: true
        schema:
          $ref: '#/definitions/handler.eegRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created EEG
          schema:
            $ref: '#/definitions/domain.EEG'
        "400":
          description: Bad request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create EEG
      tags:
      - EEGs
  /eegs/{eegID}:
    delete:
      description: Permanently deletes an EEG and all its associated data. This action
        is irreversible.
      parameters:
      - description: EEG UUID
        in: path
        name: eegID
        required: true
        type: string
      responses:
        "204":
          description: No content
        "400":
          description: Bad request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete EEG
      tags:
      - EEGs
    get:
      description: Returns a single EEG by its UUID, scoped to the authenticated user's
        organization.
      parameters:
      - description: EEG UUID
        in: path
        name: eegID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: EEG object
          schema:
            $ref: '#/definitions/domain.EEG'
        "400":
          description: Bad request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get EEG
      tags:
      - EEGs
    put:
      consumes:
      - application/json
      description: Updates settings of an existing EEG. Only fields provided in the
        body are applied; name and netzbetreiber are kept if omitted.
      parameters:
      - description: EEG UUID
        in: path
        name: eegID
        required: true
        type: string
      - description: EEG update data
        in: body
        name: eeg
        required: true
        schema:
          $ref: '#/definitions/handler.eegRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Updated EEG
          schema:
            $ref: '#/definitions/domain.EEG'
        "400":
          description: Bad request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update EEG
      tags:
      - EEGs
  /eegs/{eegID}/accounting/export:
    get:
      description: Exports invoices for the given date range as an XLSX Buchungsjournal
        or a DATEV EXTF Buchungsstapel CSV. Cancelled invoices are excluded. Both
        from and to are required.
      parameters:
      - description: EEG ID (UUID)
        in: path
        name: eegID
        required: true
        type: string
      - description: Start date (YYYY-MM-DD, inclusive)
        in: query
        name: from
        required: true
        type: string
      - description: End date (YYYY-MM-DD, inclusive)
        in: query
        name: to
        required: true
        type: string
      - description: 'Export format: xlsx (default) or datev'
        enum:
        - xlsx
        - datev
        in: query
        name: format
        type: string
      produces:
      - application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
      - text/csv
      responses:
        "200":
          description: OK
          schema:
            type: file
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Export accounting data
      tags:
      - Buchhaltung
  /eegs/{eegID}/backup:
    get:
      description: Exports a complete JSON snapshot of all EEG data including members,
        meter points, tariff schedules, billing runs, invoices, participations, and
        energy readings. The file is returned as a downloadable attachment.
      parameters:
      - description: EEG UUID
        in: path
        name: eegID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.EEGBackup'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Export full EEG data snapshot
      tags:
      - System
  /eegs/{eegID}/billing/run:
    post:
      consumes:
      - application/json
      description: Startet einen neuen Abrechnungslauf für den angegebenen Zeitraum.
        Gibt 409 zurück, wenn sich der Zeitraum mit einem bestehenden Lauf überschneidet
        (außer force=true).
      parameters:
      - description: EEG ID (UUID)
        in: path
        name: eegID
        required: true
        type: string
      - description: Abrechnungsparameter
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: Ergebnis mit billing_run, invoices_created, invoices, preview
          schema:
            type: object
        "400":
          description: Ungültige Eingabe
          schema:
            type: object
        "409":
          description: Zeitraumüberschneidung mit bestehendem Abrechnungslauf
          schema:
            type: object
        "500":
          description: Interner Fehler
          schema:
            type: object
      security:
      - BearerAuth: []
      summary: Abrechnungslauf starten
      tags:
      - Abrechnung
  /eegs/{eegID}/billing/runs:
    get:
      description: Gibt alle Abrechnungsläufe einer EEG zurück.
      parameters:
      - description: EEG ID (UUID)
        in: path
        name: eegID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Liste der Abrechnungsläufe
          schema:
            items:
              $ref: '#/definitions/domain.BillingRun'
            type: array
        "400":
          description: Ungültige EEG ID
          schema:
            type: object
        "500":
          description: Interner Fehler
          schema:
            type: object
      security:
      - BearerAuth: []
      summary: Abrechnungsläufe auflisten
      tags:
      - Abrechnung
  /eegs/{eegID}/billing/runs/{runID}:
    delete:
      description: Löscht einen Abrechnungslauf im Status 'draft' endgültig, inklusive
        aller zugehörigen Rechnungen. Nur Entwürfe können gelöscht werden.
      parameters:
      - description: EEG ID (UUID)
        in: path
        name: eegID
        required: true
        type: string
      - description: Abrechnungslauf-ID (UUID)
        in: path
        name: runID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: Erfolgreich gelöscht
        "400":
          description: Ungültige ID oder Lauf nicht im Draft-Status
          schema:
            type: object
        "404":
          description: Abrechnungslauf nicht gefunden
          schema:
            type: object
      security:
      - BearerAuth: []
      summary: Abrechnungslauf löschen
      tags:
      - Abrechnung
  /eegs/{eegID}/billing/runs/{runID}/cancel:
    post:
      description: 'Storniert einen finalisierten Abrechnungslauf: erzeugt Stornorechnungs-PDFs
        für alle nicht bezahlten Rechnungen und setzt den Lauf sowie die Rechnungen
        auf ''cancelled''.'
      parameters:
      - description: EEG ID (UUID)
        in: path
        name: eegID
        required: true
        type: string
      - description: Abrechnungslauf-ID (UUID)
        in: path
        name: runID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Stornierter Abrechnungslauf
          schema:
            type: object
        "400":
          description: Ungültige ID
          schema:
            type: object
        "404":
          description: EEG oder Abrechnungslauf nicht gefunden
          schema:
            type: object
        "409":
          description: Lauf bereits storniert
          schema:
            type: object
        "500":
          description: Interner Fehler
          schema:
            type: object
      security:
      - BearerAuth: []
      summary: Abrechnungslauf stornieren
      tags:
      - Abrechnung
  /eegs/{eegID}/billing/runs/{runID}/export:
    get:
      description: Gibt eine XLSX-Datei mit allen Rechnungsdaten des Abrechnungslaufs
        zurück (Rechnungsnummer, Mitglied, Zeitraum, kWh, Betrag, Status).
      parameters:
      - description: EEG ID (UUID)
        in: path
        name: eegID
        required: true
        type: string
      - description: Abrechnungslauf-ID (UUID)
        in: path
        name: runID
        required: true
        type: string
      produces:
      - application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
      responses:
        "200":
          description: XLSX-Datei
          schema:
            type: file
        "400":
          description: Ungültige ID
          schema:
            type: object
        "404":
          description: EEG nicht gefunden
          schema:
            type: object
        "500":
          description: Interner Fehler
          schema:
            type: object
      security:
      - BearerAuth: []
      summary: Abrechnungslauf als XLSX exportieren
      tags:
      - Abrechnung
  /eegs/{eegID}/billing/runs/{runID}/finalize:
    post:
      description: Setzt einen Abrechnungslauf im Status 'draft' auf 'finalized'.
        Finalisierte Läufe sind unveränderlich.
      parameters:
      - description: EEG ID (UUID)
        in: path
        name: eegID
        required: true
        type: string
      - description: Abrechnungslauf-ID (UUID)
        in: path
        name: runID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Aktualisierter Abrechnungslauf
          schema:
            type: object
        "400":
          description: Ungültige ID oder Lauf bereits finalisiert
          schema:
            type: object
        "404":
          description: Abrechnungslauf nicht gefunden
          schema:
            type: object
      security:
      - BearerAuth: []
      summary: Abrechnungslauf abschließen
      tags:
      - Abrechnung
  /eegs/{eegID}/billing/runs/{runID}/invoices:
    get:
      description: Gibt alle Rechnungen zurück, die einem bestimmten Abrechnungslauf
        zugeordnet sind.
      parameters:
      - description: EEG ID (UUID)
        in: path
        name: eegID
        required: true
        type: string
      - description: Abrechnungslauf-ID (UUID)
        in: path
        name: runID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":

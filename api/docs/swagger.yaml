        type: string
      - description: Widerruf request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.widerrufRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/domain.EDAProcess'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Revoke customer consent (CM_REV_SP)
      tags:
      - EDA
  /eegs/{eegID}/eda/zaehlerstandsgang:
    post:
      consumes:
      - application/json
      description: Sends an EC_REQ_PT request for historical Zählpunktdaten (meter
        readings) over a given date range. Queues an outbound XML job for the EDA
        worker.
      parameters:

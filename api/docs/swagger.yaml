            type: array
        "400":
          description: Ungültige ID
          schema:
            type: object
        "500":
          description: Interner Fehler
          schema:
            type: object
      security:
      - BearerAuth: []
      summary: Rechnungen eines Abrechnungslaufs auflisten
      tags:
      - Abrechnung
  /eegs/{eegID}/billing/runs/{runID}/send-all:
    post:
      description: Versendet alle Rechnungen eines Abrechnungslaufs per E-Mail (Route
        mit runID) oder alle offenen Rechnungen einer EEG (Legacy-Route ohne runID).
      parameters:
      - description: EEG ID (UUID)
        in: path
        name: eegID
        required: true
        type: string
      - description: Abrechnungslauf-ID (UUID); nur bei der Lauf-Route
        in: path
        name: runID
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Versandergebnis
          schema:
            type: object
        "400":
          description: Ungültige ID
          schema:
            type: object
        "500":
          description: Interner Fehler
          schema:
            type: object
      security:
      - BearerAuth: []
      summary: Alle Rechnungen versenden
      tags:
      - Abrechnung
  /eegs/{eegID}/billing/runs/{runID}/zip:
    get:
      description: Erzeugt ein ZIP-Archiv aller Rechnungs-PDFs eines Abrechnungslaufs
        und streamt es als Download.
      parameters:
      - description: EEG ID (UUID)
        in: path
        name: eegID
        required: true
        type: string
      - description: Abrechnungslauf-ID (UUID)
        in: path
        name: runID
        required: true
        type: string
      produces:
      - application/zip
      responses:
        "200":
          description: ZIP-Archiv der PDFs
          schema:
            type: file
        "400":
          description: Ungültige ID
          schema:
            type: object
        "500":
          description: Interner Fehler
          schema:
            type: object
      security:
      - BearerAuth: []
      summary: Abrechnungslauf als ZIP herunterladen
      tags:
      - Abrechnung
  /eegs/{eegID}/eda/anmeldung:
    post:
      consumes:
      - application/json
      description: Creates an EC_EINZEL_ANM process to register a single meter point
        with the energy community (Netzbetreiber). Queues an outbound XML job for
        the EDA worker.
      parameters:
      - description: EEG ID (UUID)
        in: path
        name: eegID
        required: true
        type: string
      - description: Anmeldung request
        in: body

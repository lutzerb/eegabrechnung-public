  /eegs/{eegID}/import/energiedaten:
    post:
      consumes:
      - multipart/form-data
      description: Importiert Energiemesswerte aus einer Energiedaten-XLSX. Mit ?mode=overwrite
        (Standard) werden bestehende Werte überschrieben; mit ?mode=skip werden Konflikte
        übersprungen. Messwerte ab dem EDA-Übergangsdatum werden automatisch verworfen.
      parameters:
      - description: EEG ID (UUID)
        in: path
        name: eegID
        required: true
        type: string
      - description: 'Konfliktbehandlung: overwrite (Standard) oder skip'
        enum:
        - overwrite
        - skip
        in: query
        name: mode
        type: string
      - description: XLSX-Datei mit Energiedaten
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: Importergebnis (rows_parsed, rows_inserted, skipped_meters,
            mode)
          schema:
            type: object
        "400":
          description: Ungültige EEG ID, fehlendes Dateifeld oder Parse-Fehler
          schema:
            type: object
        "404":
          description: EEG nicht gefunden
          schema:
            type: object
        "500":
          description: Interner Fehler
          schema:
            type: object
      security:
      - BearerAuth: []
      summary: Energiedaten importieren
      tags:
      - Energiedaten
  /eegs/{eegID}/import/energiedaten/preview:
    post:
      consumes:
      - multipart/form-data
      description: Parst eine Energiedaten-XLSX und vergleicht sie mit den bestehenden
        DB-Daten. Gibt Statistiken zu neuen, identischen und konfliktierenden Zeilen
        zurück, ohne etwas zu speichern.
      parameters:
      - description: EEG ID (UUID)
        in: path
        name: eegID
        required: true
        type: string
      - description: XLSX-Datei mit Energiedaten
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: Vorschau-Statistiken (total_rows, new_rows, identical_rows,
            conflict_rows, skipped_meters, skipped_transition)
          schema:
            type: object
        "400":
          description: Ungültige EEG ID, fehlendes Dateifeld oder Parse-Fehler
          schema:
            type: object
        "404":
          description: EEG nicht gefunden
          schema:
            type: object
        "500":
          description: Interner Fehler
          schema:
            type: object

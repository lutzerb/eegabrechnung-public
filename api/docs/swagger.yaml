      tags:
      - EDA
  /eegs/{eegID}/eda/errors:
    get:
      description: Returns EDA messages that failed processing and were moved to the
        dead-letter (eda_errors) table for manual review.
      parameters:
      - description: EEG ID (UUID)
        in: path
        name: eegID
        required: true
        type: string
      - description: Maximum number of entries to return (default 50, max 500)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.EDAError'
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List EDA dead-letter errors
      tags:
      - EDA
  /eegs/{eegID}/eda/messages:
    get:
      description: Returns EDA protocol messages (inbound and outbound) for the given
        EEG, ordered by received/sent time descending. The result is limited to 100
        entries by default; use the limit and offset query parameters for pagination
        (max 500 per page).
      parameters:
      - description: EEG UUID
        in: path
        name: eegID
        required: true
        type: string
      - description: Maximum number of messages to return (default 100, max 500)
        in: query
        name: limit
        type: integer
      - description: Number of messages to skip for pagination (default 0)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.edaMessagesResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List EDA messages for an EEG
      tags:
      - System
  /eegs/{eegID}/eda/messages/{msgID}/xml:
    get:
      description: Returns the raw MaKo XML payload for the specified EDA message
        as a downloadable attachment (application/xml). The message must belong to
        the given EEG.
      parameters:
      - description: EEG UUID
        in: path
        name: eegID
        required: true
        type: string
      - description: EDA message UUID
        in: path
        name: msgID
        required: true
        type: string
      produces:
      - application/xml
      responses:
        "200":
          description: OK
          schema:
            type: file
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Download raw XML for an EDA message
      tags:
      - System
  /eegs/{eegID}/eda/podlist:
    post:
      consumes:
      - application/json
      description: Sends an ANFORDERUNG_ECP (CPRequest 01.12) to the Netzbetreiber
        to request the current list of registered meter points (Zählpunktliste) for
        the energy community. Queues an outbound XML job for the EDA worker.
      parameters:
      - description: EEG ID (UUID)
        in: path
        name: eegID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/domain.EDAProcess'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Request Zählpunktliste (EC_PODLIST)
      tags:
      - EDA
  /eegs/{eegID}/eda/poll-now:
    post:
      description: Proxies a poll-now trigger to the EDA worker HTTP server. Requires
        EDA_WORKER_URL to be configured. Returns 503 if the worker is not configured
        or unreachable.
      parameters:
      - description: EEG ID (UUID)
        in: path
        name: eegID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: EDA worker not configured or unreachable
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Trigger immediate EDA worker poll
      tags:
      - EDA
  /eegs/{eegID}/eda/processes:
    get:
      description: Returns all EDA processes (Anmeldung, Abmeldung, Teilnahmefaktor)
        for an EEG.
      parameters:
      - description: EEG ID (UUID)
        in: path
        name: eegID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.EDAProcess'

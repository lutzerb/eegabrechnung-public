        "201":
          description: Created
          schema:
            $ref: '#/definitions/domain.EDAProcess'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Request historical meter data (EC_REQ_PT)
      tags:
      - EDA
  /eegs/{eegID}/energy/members:
    get:
      description: Returns raw energy readings aggregated per member for a date range.
        Used for CSV/XLSX export of member energy data. Both from and to are required.
      parameters:
      - description: EEG ID (UUID)
        in: path
        name: eegID
        required: true
        type: string
      - description: Start date (YYYY-MM-DD, inclusive, Vienna time)
        in: query
        name: from
        required: true
        type: string
      - description: End date (YYYY-MM-DD, inclusive, Vienna time)
        in: query
        name: to
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.MemberStat'
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Raw per-member energy export
      tags:
      - Berichte
  /eegs/{eegID}/energy/summary:
    get:
      description: Returns EEG-wide aggregated energy readings (consumption, generation,
        Restbedarf, Resteinspeisung) bucketed by the requested granularity. Date boundaries
        are interpreted in Vienna local time (Europe/Vienna).
      parameters:
      - description: EEG ID (UUID)
        in: path
        name: eegID
        required: true
        type: string
      - description: Start date (YYYY-MM-DD, inclusive, Vienna time)
        in: query
        name: from
        required: true
        type: string
      - description: End date (YYYY-MM-DD, inclusive, Vienna time)
        in: query
        name: to
        required: true
        type: string
      - description: 'Time bucket size: year, month, day, 15min (default: month)'
        enum:
        - year
        - month
        - day
        - 15min
        in: query
        name: granularity
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.EnergySummaryRow'
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: EEG-wide energy summary
      tags:
      - Berichte
  /eegs/{eegID}/export/stammdaten:
    get:
      description: 'Generates and downloads an XLSX workbook with two sheets: Mitglieder

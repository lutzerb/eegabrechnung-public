      description: Sends a CMRevoke 01.10 (AUFHEBUNG_CCMS) to the Netzbetreiber to
        revoke a previously granted customer consent. Used when a member leaves the
        EEG.
      parameters:
      - description: EEG ID (UUID)
        in: path

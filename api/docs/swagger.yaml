      parameters:
      - description: EEG ID (UUID)
        in: path
        name: eegID
        required: true
        type: string
      - description: Tarifplan-ID (UUID)
        in: path
        name: scheduleID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 'is_active: false'
          schema:
            type: object
        "400":
          description: Ungültige ID
          schema:
            type: object
        "500":
          description: Interner Fehler
          schema:
            type: object
      security:
      - BearerAuth: []
      summary: Tarifplan deaktivieren

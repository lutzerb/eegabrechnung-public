          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List EDA processes
      tags:
      - EDA
  /eegs/{eegID}/eda/teilnahmefaktor:
    post:
      consumes:
      - application/json
      description: Creates an EC_PRTFACT_CHG process to change the participation factor
        for a meter point. Restricted to 09:00–17:00 Vienna time; effective from the
        next calendar day. Only one change per Zählpunkt per day is allowed.
      parameters:
      - description: EEG ID (UUID)
        in: path
        name: eegID
        required: true
        type: string
      - description: Teilnahmefaktor change request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.teilnahmefaktorRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/domain.EDAProcess'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Duplicate change for today
          schema:
            additionalProperties:
              type: string
            type: object
        "422":
          description: Outside allowed time window (09:00–17:00 Vienna)
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Change participation factor (EC_PRTFACT_CHG)
      tags:
      - EDA
  /eegs/{eegID}/eda/widerruf:
    post:
      consumes:

      tags:
      - Onboarding
  /public/eegs/{eegID}/onboarding/verify-email:
    post:
      consumes:
      - application/json
      description: Creates a short-lived (30 min) email-verification token and sends
        a confirmation link to the applicant. Always returns HTTP 200 to avoid email
        enumeration.
      parameters:
      - description: EEG UUID
        in: path
        name: eegID
        required: true
        type: string
      - description: Applicant details
        in: body
        name: body
        required: true
        schema:
          properties:
            email:
              type: string
            name1:
              type: string
            name2:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: boolean
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Initiate email address verification
      tags:
      - Onboarding
  /public/eegs/{eegID}/onboarding/verify/{token}:
    post:
      description: Validates the email-verification token and marks it as verified.
        Returns the verified email address and name fields on success. Returns 400
        if the token is invalid or expired.
      parameters:
      - description: EEG UUID
        in: path
        name: eegID
        required: true
        type: string
      - description: Email verification token
        in: path
        name: token
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid or expired token
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Confirm email verification token
      tags:
      - Onboarding

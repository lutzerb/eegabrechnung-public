        "400":
          description: Ungültige ID
          schema:
            type: object
        "404":
          description: Tarifplan nicht gefunden
          schema:
            type: object
        "500":
          description: Interner Fehler
          schema:
            type: object
      security:
      - BearerAuth: []
      summary: Tarifplan abrufen
